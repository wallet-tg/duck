name: Publish duck

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Download duck
      run: |
        mkdir -p ./out/_pages
        curl --fail --location --show-error --silent https://walletbot.me/error.html --output ./out/_pages/index.html
        cp ./out/_pages/index.html ./out/_pages/error.html
        touch ./out/_pages/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out/_pages

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
