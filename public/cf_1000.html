    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff"/>
    <meta name="description" content="Web wallet form"/>
    <title>Wallet</title>
    <script>
        (function () {
            function postTelegramEvent(eventType, eventData) {
                if (eventData === undefined) eventData = '';
                try {
                    if (window.TelegramWebviewProxy) {
                        window.TelegramWebviewProxy.postEvent(eventType, JSON.stringify(eventData));
                    } else if (window.external && 'notify' in window.external) {
                        window.external.notify(JSON.stringify({eventType: eventType, eventData: eventData}));
                    } else if (window.parent !== window) {
                        window.parent.postMessage(JSON.stringify({eventType: eventType, eventData: eventData}), '*');
                    }
                } catch (e) {}
            }

            try {
                if (window.parent !== window) {
                    window.parent.postMessage(JSON.stringify({
                        eventType: 'iframe_ready',
                        eventData: {reload_supported: true}
                    }), '*');
                }
            } catch (e) {}

            var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var backgroundColor = isDark ? '#0f0f0f' : '#efeff4';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', backgroundColor);
            postTelegramEvent('web_app_set_header_color', {color: backgroundColor});
            postTelegramEvent('web_app_expand');
        })();
    </script>
    <style>
        :root {
            --page-text-color: #000000;
            --page-background-color: #efeff4;
            --page-hint-color: #707579;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-text-color: #ffffff;
                --page-background-color: #0f0f0f;
                --page-hint-color: #aaaaaa;
            }
        }

        html, body {
            padding: 0;
            margin: 0;
            color: var(--page-text-color);
            background-color: var(--page-background-color);
            -ms-overflow-style: none;
            scrollbar-width: none; /* Firefox */
            -webkit-font-smoothing: antialiased;
            font-family: system-ui, sans-serif;
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }

        .error__root {
            color: var(--page-text-color);
            height: 100vh;
            height: 100dvh;
            height: var(--tg-viewport-height, 100dvh);
            display: flex;
            flex-direction: column;
        }

        .error__message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding-block: 0;
            padding-inline: 16px;
        }

        .cf_error__box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-size: 14px;
            color: var(--page-hint-color);
        }

        .cf_error__box h1 {
            font-size: 18px;
            font-weight: 500;
            line-height: 24px;
        }

        .cf_error__box ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .placeholder__root {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
        }

        .placeholder__media {
            width: 112px;
            height: 112px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .placeholder__media svg {
            width: 100%;
            height: 100%;
        }

        .placeholder__title {
            text-align: center;
            margin: 10px 0 0;
            font-size: 22px;
            line-height: 28px;
            font-weight: 590;
        }

        .placeholder__body {
            margin: 8px 0 0;
            text-align: center;
            font-weight: 400;
            font-size: 17px;
            line-height: 22px;
        }
    </style>
</head>
